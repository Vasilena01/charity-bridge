<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - CharityBridge</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 80px auto;">
            <h1 style="text-align: center; color: #ff6b6b; margin-bottom: 10px;">Welcome Back! 👋</h1>
            <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">Log in to continue making a difference</p>

            <div id="message"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>

            <p class="text-center">
                Don't have an account? <a href="signup.html" style="color: #ff6b6b; font-weight: 600;">Sign up</a>
            </p>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        redirectIfAuthenticated();
    </script>
</body>
</html>
