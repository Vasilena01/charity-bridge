<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Campaign - CharityBridge</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/create-campaign.css">
</head>
<body>
    <header>
        <div class="header-content">
            <nav>
                <a href="index.html" class="logo">CharityBridge</a>
                <div id="header-nav" class="header-nav-wrapper">
                    <!-- Will be populated by JavaScript -->
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card create-campaign-form">
            <h1>Edit Campaign</h1>
            <p>Update your campaign details</p>

            <div id="message"></div>

            <form id="editCampaignForm" onsubmit="handleEditCampaign(event)">
                <div class="form-group">
                    <label for="title">Campaign Title</label>
                    <input type="text" id="title" name="title" required maxlength="255" placeholder="Enter a compelling title">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required rows="6" placeholder="Describe your campaign, its goals, and how contributions will be used"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="campaign_type">Campaign Type</label>
                        <select id="campaign_type" name="campaign_type" required onchange="toggleGoalAmount()">
                            <option value="">-- Select Type --</option>
                            <option value="bazaar">Christmas Bazaar</option>
                            <option value="online_game">Online Game</option>
                            <option value="fundraiser">General Fundraiser</option>
                            <option value="volunteer">Volunteer Drive</option>
                            <option value="goods">Goods Collection</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group" id="goal-amount-group">
                        <label for="goal_amount">Goal Amount</label>
                        <input type="text" id="goal_amount" name="goal_amount" placeholder="e.g. 10000">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="deadline">Campaign Deadline</label>
                        <input type="date" id="deadline" name="deadline" required>
                    </div>

                    <div class="form-group">
                        <!-- Placeholder for future fields if needed -->
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" name="action" value="save" class="btn btn-secondary">
                        Save Changes
                    </button>
                    <button type="submit" name="action" value="publish" class="btn btn-primary" id="publish-btn" style="display: none;">
                        Publish Campaign
                    </button>
                </div>

                <div class="form-cancel">
                    <a href="my-campaigns.html">Cancel and return to my campaigns</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Making a difference together, one act of kindness at a time</p>
        <p>&copy; <span id="year"></span> CharityBridge. All rights reserved.</p>
    </footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/header-nav.js"></script>
    <script>
        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();

        let campaignId = null;
        let currentCampaign = null;

        // Get campaign ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        campaignId = urlParams.get('id');

        // Set minimum deadline to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('deadline').min = tomorrow.toISOString().split('T')[0];

        // Toggle goal amount visibility based on campaign type
        function toggleGoalAmount() {
            const campaignType = document.getElementById('campaign_type').value;
            const goalAmountGroup = document.getElementById('goal-amount-group');
            const goalAmountInput = document.getElementById('goal_amount');

            // Hide goal amount for volunteer drives and goods collection
            if (campaignType === 'volunteer' || campaignType === 'goods') {
                goalAmountGroup.style.display = 'none';
                goalAmountInput.removeAttribute('required');
                goalAmountInput.value = '1'; // Set default value for backend
            } else {
                goalAmountGroup.style.display = 'block';
                goalAmountInput.setAttribute('required', 'required');
                if (goalAmountInput.value === '1') {
                    goalAmountInput.value = ''; // Clear default value
                }
            }
        }

        // Check authentication and role
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const userJson = localStorage.getItem('user');

            if (!token || !userJson) {
                window.location.href = 'login.html?redirect=edit-campaign.html?id=' + campaignId;
                return;
            }

            const user = JSON.parse(userJson);
            if (user.role !== 'organizer') {
                alert('Only organizers can edit campaigns.');
                window.location.href = 'index.html';
                return;
            }

            if (!campaignId) {
                alert('No campaign specified');
                window.location.href = 'my-campaigns.html';
                return;
            }

            loadCampaign();
        }

        async function loadCampaign() {
            try {
                const user = JSON.parse(localStorage.getItem('user'));

                const response = await fetch(`/api/campaigns/?id=${campaignId}`, {
                    credentials: 'include',
                    headers: {
                        'X-User-Id': user.id
                    }
                });

                const data = await response.json();

                if (data.success && data.campaign) {
                    currentCampaign = data.campaign;

                    // Check ownership
                    if (currentCampaign.organizer_id !== user.id) {
                        alert('You can only edit your own campaigns');
                        window.location.href = 'my-campaigns.html';
                        return;
                    }

                    // Populate form
                    document.getElementById('title').value = currentCampaign.title;
                    document.getElementById('description').value = currentCampaign.description;
                    document.getElementById('campaign_type').value = currentCampaign.campaign_type;
                    document.getElementById('goal_amount').value = currentCampaign.goal_amount;

                    // Format date for input (YYYY-MM-DD)
                    const deadlineDate = new Date(currentCampaign.deadline);
                    document.getElementById('deadline').value = deadlineDate.toISOString().split('T')[0];

                    // Show publish button if campaign is draft
                    if (currentCampaign.status === 'draft') {
                        document.getElementById('publish-btn').style.display = 'block';
                    }

                    // Initialize goal amount visibility
                    toggleGoalAmount();
                } else {
                    showMessage('error', data.error || 'Campaign not found');
                    setTimeout(() => {
                        window.location.href = 'my-campaigns.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('error', 'An error occurred while loading the campaign');
            }
        }

        async function handleEditCampaign(event) {
            event.preventDefault();

            const form = event.target;
            const submitButton = event.submitter;
            const action = submitButton.value; // 'save' or 'publish'

            const campaignType = form.campaign_type.value;
            let goalAmount = 1;

            // Only include goal amount for monetary campaigns
            if (campaignType !== 'volunteer' && campaignType !== 'goods') {
                const goalAmountValue = form.goal_amount.value.trim();

                // Validate that goal amount is a positive number
                if (!goalAmountValue || isNaN(goalAmountValue) || parseFloat(goalAmountValue) <= 0) {
                    showMessage('error', 'Please enter a valid goal amount (positive number)');
                    return;
                }

                goalAmount = parseFloat(goalAmountValue);
            }

            const formData = {
                title: form.title.value.trim(),
                description: form.description.value.trim(),
                campaign_type: campaignType,
                goal_amount: goalAmount,
                deadline: form.deadline.value + 'T23:59:59',
                visibility: 'public'
            };

            // If action is publish, update status
            if (action === 'publish') {
                formData.status = 'published';
            }

            try {
                submitButton.disabled = true;
                submitButton.textContent = action === 'publish' ? 'Publishing...' : 'Saving...';

                const user = JSON.parse(localStorage.getItem('user'));

                const response = await fetch(`/api/campaigns/${campaignId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': user.id
                    },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    const message = action === 'publish' ? 'Campaign published successfully!' : 'Campaign updated successfully!';
                    showMessage('success', message);
                    setTimeout(() => {
                        window.location.href = 'my-campaigns.html';
                    }, 1500);
                } else {
                    showMessage('error', data.error || 'Failed to update campaign');
                    submitButton.disabled = false;
                    submitButton.textContent = action === 'publish' ? 'Publish Campaign' : 'Save Changes';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('error', 'An error occurred. Please try again.');
                submitButton.disabled = false;
                submitButton.textContent = action === 'publish' ? 'Publish Campaign' : 'Save Changes';
            }
        }

        function showMessage(type, message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type === 'success' ? 'success' : 'errors';
            messageDiv.innerHTML = `<p>${message}</p>`;
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Check auth on page load
        checkAuth();
    </script>
</body>
</html>
